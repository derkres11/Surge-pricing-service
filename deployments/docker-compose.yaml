version: '3.8'

services:
  app:
    build: .
    container_name: Dynamic_ride_price_creation
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy



  db:
    image: postgres:15-alpine
    container_name:  Postgres_Ride_Price
    environment:
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: 
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U USER1 -d POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redisdb:
    image: redis:7-alpine
    containter_name: Redis_Ride_Price
  ports:
    - "6379:6379"

  volumes:
    postgres_data:
  
